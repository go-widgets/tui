name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOWORK: "off"
  CGO_ENABLED: "0"

jobs:
  test:
    name: Build + test + 100% coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Test library packages with coverage
        run: go test -coverprofile=coverage.out $(go list ./... | grep -v '/cmd/')

      - name: Assert 100% statement coverage (library packages)
        run: |
          total=$(go tool cover -func=coverage.out | awk 'END { gsub(/%/,"",$3); print $3 }')
          echo "total coverage: ${total}%"
          if [ "$(printf '%.0f' "$total")" != "100" ]; then
            echo "::error::coverage below 100% (got ${total}%)"
            go tool cover -func=coverage.out | grep -v "100.0%"
            exit 1
          fi

      - name: Test cmd packages (also gated at 100%)
        # cmd/tui-snapshot factors main() through a run(...)int seam +
        # runFunc/osExit dependency injection, so the whole package
        # holds 100% statement coverage — no reason to relax the gate
        # here just because it's under cmd/.
        run: |
          go test -coverprofile=coverage-cmd.out ./cmd/...
          total=$(go tool cover -func=coverage-cmd.out | awk 'END { gsub(/%/,"",$3); print $3 }')
          echo "cmd coverage: ${total}%"
          if [ "$(printf '%.0f' "$total")" != "100" ]; then
            echo "::error::cmd coverage below 100% (got ${total}%)"
            go tool cover -func=coverage-cmd.out | grep -v "100.0%"
            exit 1
          fi

      - name: Cross-compile smoke
        run: |
          GOOS=js     GOARCH=wasm  go build ./...
          GOOS=linux  GOARCH=arm64 go build ./...
          GOOS=darwin GOARCH=arm64 go build ./...
